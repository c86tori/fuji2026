<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FUJI ROCK FESTIVAL '26 タイムテーブル</title>
  <meta name="description" content="FUJI ROCK FESTIVAL '26 のA4 10分刻みタイムテーブルPDF。">
  <style>
    :root { --bg:#f7f7f5; --ink:#191919; --muted:#666; --card:#fff; --line:#ddd; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", "Yu Gothic", sans-serif; background:var(--bg); color:var(--ink); }
    header { padding: 28px 18px 16px; text-align:center; }
    h1 { margin:0 0 8px; font-size: clamp(24px, 4.8vw, 42px); letter-spacing:.02em; }
    .lead { margin:0 auto; max-width:760px; color:var(--muted); line-height:1.7; font-size:15px; }
    main { width:min(1120px, 100%); margin:0 auto; padding: 12px 14px 40px; }
    .download { background:#111; color:#fff; border-radius:20px; padding:20px; margin:0 0 18px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    .download h2 { color:#fff; margin:0 0 6px; }
    .download p { margin:0; color:#ddd; line-height:1.6; }
    .download a { display:inline-block; padding:12px 16px; border-radius:999px; background:#fff; color:#111; text-decoration:none; font-weight:800; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .thumb { display:block; background:#fff; border-bottom:1px solid var(--line); }
    .thumb img { display:block; width:100%; height:auto; }
    .body { padding:16px; }
    h2 { margin:0 0 10px; font-size:22px; }
    .buttons { display:flex; gap:8px; flex-wrap:wrap; }
    a.button { display:inline-block; padding:10px 12px; border-radius:999px; background:#111; color:#fff; text-decoration:none; font-weight:700; font-size:14px; }
    a.sub { background:#e9e9e6; color:#111; }
    footer { color:var(--muted); text-align:center; font-size:12px; padding:0 16px 32px; line-height:1.6; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } header { text-align:left; } .lead { margin:0; } }
  </style>
</head>
<body>
  <header>
    <h1>FUJI ROCK FESTIVAL '26<br>10分刻みタイムテーブル</h1>
    <p class="lead">A4横1枚で見られるように整理したPDFです。各日09:00-29:00の時間軸で、同じ時間にどのステージで何が演っているかを確認できます。</p>
  </header>
  <main>
    <section class="download" aria-label="3日間まとめPDF">
      <div>
        <h2>3日間まとめPDF</h2>
        <p>24 FRI / 25 SAT / 26 SUN を1つのPDFにまとめています。</p>
      </div>
      <a href="assets/3days.pdf" download>PDFをダウンロード</a>
    </section>
    <section class="grid" aria-label="日別タイムテーブル">
      <article class="card">
        <a class="thumb" href="assets/24fri.pdf"><img src="assets/24fri.png" alt="24 FRI タイムテーブルのプレビュー"></a>
        <div class="body"><h2>24 FRI</h2><div class="buttons"><a class="button" href="assets/24fri.pdf">PDFを見る</a><a class="button sub" href="assets/24fri.csv">CSV</a></div></div>
      </article>
      <article class="card">
        <a class="thumb" href="assets/25sat.pdf"><img src="assets/25sat.png" alt="25 SAT タイムテーブルのプレビュー"></a>
        <div class="body"><h2>25 SAT</h2><div class="buttons"><a class="button" href="assets/25sat.pdf">PDFを見る</a><a class="button sub" href="assets/25sat.csv">CSV</a></div></div>
      </article>
      <article class="card">
        <a class="thumb" href="assets/26sun.pdf"><img src="assets/26sun.png" alt="26 SUN タイムテーブルのプレビュー"></a>
        <div class="body"><h2>26 SUN</h2><div class="buttons"><a class="button" href="assets/26sun.pdf">PDFを見る</a><a class="button sub" href="assets/26sun.csv">CSV</a></div></div>
      </article>
    </section>
  </main>
  <footer>
    <p>個人用に整理した非公式タイムテーブルです。出演時間などは必ず公式発表も確認してください。</p>
  </footer>
</body>
</html>
